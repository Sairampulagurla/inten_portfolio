<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Sai Ram Portfolio</title>

    <meta name="description" content="Contact Sai Ram for collaboration, projects, or opportunities.">
</head>

<body>

<header>
    <h1>Contact Me</h1>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

<section aria-labelledby="contact-heading">

    <h2 id="contact-heading">Send a Message</h2>

    <form action="#" method="post">

        <div>
            <label for="name">Full Name</label>
            <input
                type="text"
                id="name"
                name="name"
                required
                aria-required="true">
        </div>

        <br>

        <div>
            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                required
                aria-required="true">
        </div>

        <br>

        <div>
            <label for="subject">Subject</label>
            <input
                type="text"
                id="subject"
                name="subject">
        </div>

        <br>

        <div>
            <label for="message">Message</label>
            <textarea
                id="message"
                name="message"
                rows="5"
                required
                aria-required="true"></textarea>
        </div>

        <br>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

</main>

<footer>
    <p>&copy; 2026 Sai Ram</p>
</footer>

</body>
</html>
